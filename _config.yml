# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: 秀洸建設档案室
email: lieri1457@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  关于《修学旅行被分到了不熟的小组》(渡会x日置/简洸cp)的时间线、正剧、小说、二创作品等导航/存档汇总
url: "https://eri329.github.io" # the base hostname & protocol for your site, e.g. http://example.com
baseurl: "/hidekou" # the subpath of your site, e.g. /blog
github_username: "eri329"

markdown: kramdown
highlighter: rouge
javascript_enabled: true
#google_analytics: UA-NNNNNNNN-N

header_pages:
  - index.md
  - drama.md
  - novel.md
  - fanwork.md
  - gallery.md
  - more.md
  - about.md

